<div class="product-catalog">
  <h1>Product Catalog</h1>

  <div class="filters">
    <input type="text" placeholder="Search by name" [(ngModel)]="searchText" (input)="filterProducts()" />
    <select [(ngModel)]="selectedCategory" (change)="filterProducts()">
      <option value="">All Categories</option>
      <option *ngFor="let category of getUniqueCategories()" [value]="category">{{ category }}</option>
    </select>
    <select [(ngModel)]="selectedPriceRange" (change)="filterProducts()">
      <option value="">All Price Ranges</option>
      <option value="0-50">$0 - $50</option>
      <option value="50-100">$50 - $100</option>
      <option value="100-200">$100 - $200</option>
      <option value="200+">$200+</option>
    </select>
    <select [(ngModel)]="sortBy" (change)="sortProducts()">
      <option value="">Sort By</option>
      <option value="priceAsc">Price: Low to High</option>
      <option value="priceDesc">Price: High to Low</option>
      <option value="ratingAsc">Rating: Low to High</option>
      <option value="ratingDesc">Rating: High to Low</option>
    </select>
  </div>

  <div class="product-list">
    <div *ngFor="let product of filteredProducts" class="product-card">
      <h2>{{ product.name }}</h2>
      <p>Category: {{ product.category }}</p>
      <p>Price: ${{ product.price }}</p>
      <p>Rating: {{ product.rating }} / 5</p>
      <p>Stock: {{ product.stock }}</p>
    </div>
  </div>

  <div class="no-products" *ngIf="filteredProducts.length === 0">
    <p>No products found.</p>
  </div>
      
</div>
