<div class="emp-reg-form-container">
  <h2>Employee Registration</h2>

  <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Name *</label>
      <input id="name" type="text" formControlName="name" />
      <div class="error" *ngIf="employeeForm.get('name')?.invalid && employeeForm.get('name')?.touched">
        Name is required.
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email *</label>
      <input id="email" type="email" formControlName="email" />
      <div class="error" *ngIf="employeeForm.get('email')?.invalid && employeeForm.get('email')?.touched">
        Please enter a valid email address.
      </div>
    </div>

    <div class="form-group">
      <label for="mobile">Mobile *</label>
      <input id="mobile" type="text" formControlName="mobile" />
      <div class="error" *ngIf="employeeForm.get('mobile')?.invalid && employeeForm.get('mobile')?.touched">
        Please enter a valid 10-digit mobile number.
      </div>
    </div>

    <div class="form-group">
      <label for="department">Department</label>
      <select id="department" formControlName="department">
        <option value="">Select Department</option>
        <option *ngFor="let dept of departments" [value]="dept.name">{{ dept.name }}</option>
      </select>
      <div class="error" *ngIf="employeeForm.get('department')?.invalid && employeeForm.get('department')?.touched">
        Please select a department.
      </div>
    </div>

    <div class="form-group">
      <label for="experience">Experience</label>
      <input id="experience" type="number" formControlName="experience" />
      <div class="error" *ngIf="employeeForm.get('experience')?.invalid && employeeForm.get('experience')?.touched">
        Please enter a valid experience value.
      </div>
    </div>

    <div class="form-group skills-group" formGroupName="skills">
      <label>Skills</label>
      <div>
        <label><input type="checkbox" formControlName="angular" /> Angular</label>
      </div>
      <div>
        <label><input type="checkbox" formControlName="react" /> React</label>
      </div>
      <div>
        <label><input type="checkbox" formControlName="javascript" /> JavaScript</label>
      </div>
      <div>
        <label><input type="checkbox" formControlName="typescript" /> TypeScript</label>
      </div>
    </div>

    <fieldset formGroupName="address" class="address-group">
      <legend>Address</legend>

      <div class="form-group">
        <label for="street">Street</label>
        <input id="street" type="text" formControlName="street" />
      </div>

      <div class="form-group">
        <label for="city">City</label>
        <input id="city" type="text" formControlName="city" />
      </div>

      <div class="form-group">
        <label for="zipCode">ZipCode</label>
        <input id="zipCode" type="text" formControlName="zipCode" />
      </div>
    </fieldset>

    <div class="company-actions">
      <button type="button" (click)="addPreviousCompany()">Add Previous Company</button>
    </div>

    <div formArrayName="previousCompanies" class="previous-companies">
      <div *ngFor="let company of previousCompanies.controls; let i = index" [formGroupName]="i" class="company-card">
        <h3>Previous Company {{ i + 1 }}</h3>

        <div class="form-group">
          <label for="companyName-{{i}}">Company Name</label>
          <input id="companyName-{{i}}" type="text" formControlName="companyName" />
        </div>

        <div class="form-group">
          <label for="designation-{{i}}">Designation</label>
          <input id="designation-{{i}}" type="text" formControlName="designation" />
        </div>

        <div class="form-group">
          <label for="years-{{i}}">Years</label>
          <input id="years-{{i}}" type="number" formControlName="years" />
        </div>

        <button type="button" class="tertiary" (click)="removeCompany(i)">Remove</button>
      </div>
    </div>

    <div class="company-actions">
      <button type="button" (click)="addPreviousCompany()">+ Add Another Company</button>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="employeeForm.invalid">Submit</button>
      <button type="button" (click)="resetForm()">Reset</button>
    </div>
  </form>
</div>
